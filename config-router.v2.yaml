# v2 router config — workers are pure OAuth proxies, so we use the
# `anthropic/<model>` provider with the worker URL as api_base. LiteLLM
# forwards Anthropic-format requests; the worker rewrites auth and ships
# to api.anthropic.com.
#
# `api_key: "dummy"` is only present because LiteLLM's anthropic provider
# requires an api_key field to parse config. The worker strips / replaces
# any Authorization header before forwarding, so the value is unused.

model_list:
  # Claude via workers — short aliases, round-robin across both workers
  - model_name: "sonnet"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
      api_base: http://worker1:4000
      api_key: "dummy"
  - model_name: "sonnet"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
      api_base: http://worker2:4000
      api_key: "dummy"

  - model_name: "opus"
    litellm_params:
      model: "anthropic/claude-opus-4-7"
      api_base: http://worker1:4000
      api_key: "dummy"
  - model_name: "opus"
    litellm_params:
      model: "anthropic/claude-opus-4-7"
      api_base: http://worker2:4000
      api_key: "dummy"

  - model_name: "haiku"
    litellm_params:
      model: "anthropic/claude-haiku-4-5"
      api_base: http://worker1:4000
      api_key: "dummy"
  - model_name: "haiku"
    litellm_params:
      model: "anthropic/claude-haiku-4-5"
      api_base: http://worker2:4000
      api_key: "dummy"

  # Full Anthropic IDs (what Claude Code defaults to)
  - model_name: "claude-opus-4-7"
    litellm_params:
      model: "anthropic/claude-opus-4-7"
      api_base: http://worker1:4000
      api_key: "dummy"
  - model_name: "claude-opus-4-7"
    litellm_params:
      model: "anthropic/claude-opus-4-7"
      api_base: http://worker2:4000
      api_key: "dummy"

  - model_name: "claude-sonnet-4-6"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
      api_base: http://worker1:4000
      api_key: "dummy"
  - model_name: "claude-sonnet-4-6"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
      api_base: http://worker2:4000
      api_key: "dummy"

  - model_name: "claude-haiku-4-5"
    litellm_params:
      model: "anthropic/claude-haiku-4-5"
      api_base: http://worker1:4000
      api_key: "dummy"
  - model_name: "claude-haiku-4-5"
    litellm_params:
      model: "anthropic/claude-haiku-4-5"
      api_base: http://worker2:4000
      api_key: "dummy"

  # Sticky -a (worker1) / -b (worker2) variants
  - model_name: "claude-opus-4-7-a"
    litellm_params:
      model: "anthropic/claude-opus-4-7"
      api_base: http://worker1:4000
      api_key: "dummy"
  - model_name: "claude-opus-4-7-b"
    litellm_params:
      model: "anthropic/claude-opus-4-7"
      api_base: http://worker2:4000
      api_key: "dummy"

  - model_name: "claude-sonnet-4-6-a"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
      api_base: http://worker1:4000
      api_key: "dummy"
  - model_name: "claude-sonnet-4-6-b"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
      api_base: http://worker2:4000
      api_key: "dummy"

  - model_name: "claude-haiku-4-5-a"
    litellm_params:
      model: "anthropic/claude-haiku-4-5"
      api_base: http://worker1:4000
      api_key: "dummy"
  - model_name: "claude-haiku-4-5-b"
    litellm_params:
      model: "anthropic/claude-haiku-4-5"
      api_base: http://worker2:4000
      api_key: "dummy"

  # Z.AI (direct, unchanged from v1 — no worker involvement)
  - model_name: "glm"
    litellm_params:
      model: "openai/glm-5.1"
      api_base: "https://api.z.ai/api/coding/paas/v4"
      api_key: "os.environ/ZAI_API_KEY"
  - model_name: "glm-5.1"
    litellm_params:
      model: "openai/glm-5.1"
      api_base: "https://api.z.ai/api/coding/paas/v4"
      api_key: "os.environ/ZAI_API_KEY"
  - model_name: "glm-5-turbo"
    litellm_params:
      model: "openai/glm-5-turbo"
      api_base: "https://api.z.ai/api/coding/paas/v4"
      api_key: "os.environ/ZAI_API_KEY"
  - model_name: "glm-4.7"
    litellm_params:
      model: "openai/glm-4.7"
      api_base: "https://api.z.ai/api/coding/paas/v4"
      api_key: "os.environ/ZAI_API_KEY"
  - model_name: "glm-4.6"
    litellm_params:
      model: "openai/glm-4.6"
      api_base: "https://api.z.ai/api/coding/paas/v4"
      api_key: "os.environ/ZAI_API_KEY"
  - model_name: "glm-4.5-air"
    litellm_params:
      model: "openai/glm-4.5-air"
      api_base: "https://api.z.ai/api/coding/paas/v4"
      api_key: "os.environ/ZAI_API_KEY"
  - model_name: "glm-4.5-flash"
    litellm_params:
      model: "openai/glm-4.5-flash"
      api_base: "https://api.z.ai/api/coding/paas/v4"
      api_key: "os.environ/ZAI_API_KEY"
  - model_name: "glm-5"
    litellm_params:
      model: "openai/glm-5"
      api_base: "https://api.z.ai/api/coding/paas/v4"
      api_key: "os.environ/ZAI_API_KEY"
  - model_name: "glm-4.7-flash"
    litellm_params:
      model: "openai/glm-4.7-flash"
      api_base: "https://api.z.ai/api/coding/paas/v4"
      api_key: "os.environ/ZAI_API_KEY"
  - model_name: "glm-4.7-flashx"
    litellm_params:
      model: "openai/glm-4.7-flashx"
      api_base: "https://api.z.ai/api/coding/paas/v4"
      api_key: "os.environ/ZAI_API_KEY"
  - model_name: "glm-4.6v"
    litellm_params:
      model: "openai/glm-4.6v"
      api_base: "https://api.z.ai/api/coding/paas/v4"
      api_key: "os.environ/ZAI_API_KEY"
  - model_name: "glm-4.5"
    litellm_params:
      model: "openai/glm-4.5"
      api_base: "https://api.z.ai/api/coding/paas/v4"
      api_key: "os.environ/ZAI_API_KEY"
  - model_name: "glm-4.5v"
    litellm_params:
      model: "openai/glm-4.5v"
      api_base: "https://api.z.ai/api/coding/paas/v4"
      api_key: "os.environ/ZAI_API_KEY"

  # ChatGPT OAuth — requires the upstream image that bundles the `chatgpt`
  # provider. The stock `ghcr.io/berriai/litellm` image does NOT include it,
  # so if you switch to that image you'll need to either drop these entries
  # or register chatgpt as a custom provider. See README-v2.md.
  # - model_name: "gpt"
  #   model_info:
  #     mode: responses
  #   litellm_params:
  #     model: "chatgpt/gpt-5.4"

router_settings:
  routing_strategy: "simple-shuffle"
  num_retries: 1
  retry_after: 0
  allowed_fails: 1
  cooldown_time: 1800

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]
  service_callback: ["prometheus_system"]
