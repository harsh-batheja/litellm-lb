services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: litellm
    volumes:
    - litellm-db-v2:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U litellm -d litellm
      interval: 5s
      timeout: 5s
      retries: 20
  worker1:
    image: litellm-lb-oauth-proxy:local
    build:
      context: ./worker-image
    restart: unless-stopped
    volumes:
    - worker1-claude:/home/claude/.claude
    environment:
      LOG_LEVEL: INFO
  worker2:
    image: litellm-lb-oauth-proxy:local
    build:
      context: ./worker-image
    restart: unless-stopped
    volumes:
    - worker2-claude:/home/claude/.claude
    environment:
      LOG_LEVEL: INFO
  router:
    image: ghcr.io/berriai/litellm:main-stable
    restart: unless-stopped
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@db:5432/litellm
      STORE_MODEL_IN_DB: 'True'
      ZAI_API_KEY: ${ZAI_API_KEY}
      CHATGPT_TOKEN_DIR: /app/chatgpt-data
    volumes:
    - ./config-router.yaml:/app/config.yaml:ro
    - ./chatgpt-data:/app/chatgpt-data
    - ./ui-btn-patched.js:/usr/lib/python3.13/site-packages/litellm/proxy/_experimental/out/_next/static/chunks/80899acb7e1a7640.js:ro
    - ./sticky_router.py:/app/sticky_router.py:ro
    command:
    - --config
    - /app/config.yaml
    - --port
    - '4000'
    depends_on:
      db:
        condition: service_healthy
      worker1:
        condition: service_started
      worker2:
        condition: service_started
    env_file: .env
volumes:
  litellm-db-v2: null
  worker1-claude: null
  worker2-claude: null
