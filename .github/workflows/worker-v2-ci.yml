name: worker-v2 CI

on:
  push:
    paths:
      - "worker-image-v2/**"
      - ".github/workflows/worker-v2-ci.yml"
  pull_request:
    paths:
      - "worker-image-v2/**"
      - ".github/workflows/worker-v2-ci.yml"

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker-image-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: worker-image-v2
          push: false
          tags: litellm-lb-oauth-proxy:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-run the image (startup without creds should fail fast)
        run: |
          # Without a credentials file, the lifespan hook logs an error and
          # uvicorn exits. This is correct behaviour — we verify that exit
          # code is non-zero.
          if docker run --rm -d --name smoke -p 4000:4000 litellm-lb-oauth-proxy:ci; then
            sleep 2
            # Container may still be up; health endpoint should report 503
            if curl -sS --max-time 3 http://localhost:4000/health | grep -q "error"; then
              echo "ok: health reports error (no creds) as expected"
            fi
            docker rm -f smoke >/dev/null 2>&1 || true
          fi
