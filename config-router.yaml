router_settings:
  routing_strategy: "simple-shuffle"
  num_retries: 1
  retry_after: 0
  allowed_fails: 1
  cooldown_time: 1800

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  drop_params: true
  # Phase 2 observability: emit Prometheus metrics on /metrics
  # (scraped by Prometheus on CT118 using virtual key alias prometheus-scraper).
  success_callback: ["prometheus"]
  failure_callback: ["prometheus"]
  service_callback: ["prometheus_system"]
