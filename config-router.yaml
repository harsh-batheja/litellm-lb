# LiteLLM router config. Models expose canonical upstream names only —
# short aliases (sonnet/opus/haiku/glm/gpt) are intentionally NOT registered
# so team members use the real model identifier, which stays stable when
# we upgrade the underlying model version. The `-a` / `-b` suffixes are not
# aliases — they pin requests to a specific OAuth subscription (worker1 /
# worker2). Unsuffixed Claude names round-robin across both workers.

model_list:
- model_name: claude-opus-4-7
  litellm_params:
    model: anthropic/claude-opus-4-7
    api_base: http://worker1:4000
    api_key: dummy
- model_name: claude-opus-4-7
  litellm_params:
    model: anthropic/claude-opus-4-7
    api_base: http://worker2:4000
    api_key: dummy
- model_name: claude-sonnet-4-6
  litellm_params:
    model: anthropic/claude-sonnet-4-6
    api_base: http://worker1:4000
    api_key: dummy
- model_name: claude-sonnet-4-6
