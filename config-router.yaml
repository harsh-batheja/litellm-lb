# LiteLLM router config. Models expose canonical upstream names only —
# short aliases removed per team policy. '-a' / '-b' suffixes pin to a
# specific OAuth subscription (worker1 / worker2).
#
# ChatGPT OAuth via 'chatgpt/' provider is actually the Codex CLI backend,
# which OpenAI restricts to a small model subset. As of 2026-04-21 only
# gpt-5.4 and gpt-5.2 are reachable that way (Codex rejects everything
# else with 'not supported when using Codex with a ChatGPT account').
# To expose gpt-4.5 / gpt-5 / 4o / o3 / o4 etc., register an 'openai/'
# provider with an api.openai.com API key (pay-per-token; NOT included
# in a ChatGPT subscription).

model_list:
- model_name: claude-opus-4-7
  litellm_params:
    model: anthropic/claude-opus-4-7
    api_base: http://worker1:4000
    api_key: dummy
- model_name: claude-opus-4-7
  litellm_params:
    model: anthropic/claude-opus-4-7
    api_base: http://worker2:4000
    api_key: dummy
- model_name: claude-sonnet-4-6
  litellm_params:
