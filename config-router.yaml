# LiteLLM router config. Models expose canonical upstream names only —
# short aliases removed per team policy. '-a' / '-b' suffixes pin to a
# specific OAuth subscription (worker1 / worker2).
#
# ChatGPT via 'chatgpt/' is the Codex CLI OAuth backend. Empirical probe
# on 2026-04-21 found OpenAI currently serves exactly 4 models on that
# endpoint:
#   gpt-5.4          — current Codex primary
#   gpt-5.4-mini     — smaller/faster sibling
#   gpt-5.3-codex    — Codex-tuned variant of 5.3
#   gpt-5.2          — previous primary
# Everything else (gpt-5, gpt-4.5, 4o, o-series, codex-mini-latest) fails
# with 'not supported when using Codex with a ChatGPT account'. For real
# OpenAI catalog access, register an 'openai/' provider with an API key.

model_list:
- model_name: claude-opus-4-7
  litellm_params:
    model: anthropic/claude-opus-4-7
    api_base: http://worker1:4000
    api_key: dummy
- model_name: claude-opus-4-7
  litellm_params:
    model: anthropic/claude-opus-4-7
    api_base: http://worker2:4000
    api_key: dummy
- model_name: claude-sonnet-4-6
  litellm_params:
    model: anthropic/claude-sonnet-4-6
    api_base: http://worker1:4000
    api_key: dummy
- model_name: claude-sonnet-4-6
