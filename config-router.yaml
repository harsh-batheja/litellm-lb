- model_name: gpt-5.4
  model_info:
    mode: responses
  litellm_params:
    model: chatgpt/gpt-5.4
- model_name: gpt-5.4-mini
  model_info:
    mode: responses
  litellm_params:
    model: chatgpt/gpt-5.4-mini
- model_name: gpt-5.3-codex
