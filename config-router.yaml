# LiteLLM router config. Canonical upstream model names only — no short aliases.
# '-a' / '-b' suffixes pin to a specific OAuth subscription (worker1 / worker2).
#
# ChatGPT via 'chatgpt/' is the Codex CLI OAuth backend. Empirical probe of
# ~40 candidate model names on 2026-04-21 returned exactly 4 working entries:
#   gpt-5.4          — current Codex primary
#   gpt-5.4-mini     — smaller/faster sibling
#   gpt-5.3-codex    — Codex-tuned 5.3 variant
#   gpt-5.2          — previous primary
# Everything else (gpt-5, gpt-4.5, 4o, o1/o3/o4) fails with 'not supported
# when using Codex with a ChatGPT account'. For the full OpenAI catalog,
# register an 'openai/' provider block with an api.openai.com API key.

model_list:
- model_name: claude-opus-4-7
  litellm_params:
    model: anthropic/claude-opus-4-7
    api_base: http://worker1:4000
    api_key: dummy
- model_name: claude-opus-4-7
