router_settings:
  routing_strategy: simple-shuffle
  num_retries: 1
  retry_after: 0
  allowed_fails: 1
  cooldown_time: 1800
  fallbacks:
    - claude-opus-4-7-a:   [claude-opus-4-7-b]
    - claude-opus-4-7-b:   [claude-opus-4-7-a]
    - claude-sonnet-4-6-a: [claude-sonnet-4-6-b]
    - claude-sonnet-4-6-b: [claude-sonnet-4-6-a]
    - claude-haiku-4-5-a:  [claude-haiku-4-5-b]
    - claude-haiku-4-5-b:  [claude-haiku-4-5-a]
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
litellm_settings:
  drop_params: true
  callbacks: sticky_router.proxy_handler_instance
  default_internal_user_params:
    models:
      - claude-opus-4-7
      - claude-sonnet-4-6
      - claude-haiku-4-5
      - glm-5.1
      - glm-5-turbo
      - glm-4.7
      - glm-4.6
      - glm-4.5
      - glm-4.5-air
      - glm-4.5-flash
      - glm-4.5v
      - glm-4.6v
      - glm-4.7-flash
      - glm-4.7-flashx
      - glm-5
      - gpt-5.4
      - gpt-5.4-mini
      - gpt-5.3-codex
      - gpt-5.2
  success_callback:
  - prometheus
  failure_callback:
  - prometheus
  service_callback:
  - prometheus_system
