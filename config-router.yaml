router_settings:
  routing_strategy: simple-shuffle
  num_retries: 1
  retry_after: 0
  allowed_fails: 1
  cooldown_time: 1800
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
litellm_settings:
  drop_params: true
  success_callback:
  - prometheus
  failure_callback:
  - prometheus
  service_callback:
  - prometheus_system
